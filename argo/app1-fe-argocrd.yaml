apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sync-wave-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Devanshusoni143/app1-config.git
    targetRevision: HEAD
    path: frontend
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: production
