apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  APP_ENV: "production"
  APP_PORT: "80"
  DB_HOST: "postgres-svc.production.svc.cluster.local"
  DB_PORT: "5432"
  REDIS_HOST: "redis-svc.production.svc.cluster.local"
  REDIS_PORT: "6379"
  LOG_LEVEL: "info"
