apiVersion: batch/v1
kind: Job
metadata:
  name: db-migration-v1-0-1       # bump this version on each release: v1-1-0, v1-2-0 etc.
  namespace: production
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2                   # retry max 2 times before marking failed
  activeDeadlineSeconds: 120        # kill job if running more than 2 minutes
  template:
    spec:
      restartPolicy: Never
      serviceAccountName: my-app-sa
      initContainers:
        # Wait for postgres to actually accept TCP connections before migrating
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres to be ready..."
              until nc -z postgres-svc.production.svc.cluster.local 5432; do
                echo "Postgres not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "Postgres is up and accepting connections"
      containers:
        - name: migrate
          image: busybox:1.35
          # ------------------------------------------------------------
          # MINIKUBE TESTING: dummy command that always succeeds
          # In production replace this with your real migration command:
          #   Node.js  -> ["node", "scripts/migrate.js"]
          #   Django   -> ["python", "manage.py", "migrate", "--noinput"]
          #   Golang   -> ["./app", "migrate"]
          #   Flyway   -> ["flyway", "migrate"]
          # ------------------------------------------------------------
          command:
            - sh
            - -c
            - |
              echo "Running database migrations..."
              sleep 5
              echo "Migration complete successfully"
              exit 1
